name: Update Nursing Exam Tracker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Copy data into docs for GitHub Pages
        run: |
          mkdir -p docs/data
          cp data/notices.json docs/data/notices.json

      - name: Commit and push if changed
        run: |
          git config user.name "nursing-tracker-bot"
          git config user.email "actions@github.com"
          git add data/notices.json docs/data/notices.json
          git diff --quiet --cached || git commit -m "Auto-update: nursing notices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
